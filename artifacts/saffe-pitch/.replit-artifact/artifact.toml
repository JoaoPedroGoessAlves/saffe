kind = "slides"
previewPath = "/saffe-pitch/"
title = "Saffe Pitch Deck"
version = "1.0.0"
id = "artifacts/saffe-pitch"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/saffe-pitch/" ]
localPort = 19801

[services.development]
run = "pnpm --filter @workspace/saffe-pitch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saffe-pitch", "run", "build" ]
publicDir = "artifacts/saffe-pitch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19801"
BASE_PATH = "/saffe-pitch/"
